# yaml-language-server: $schema=https://github.com/Azure/deployment-environments/releases/download/2022-11-11-preview/manifest.schema.json
name: SmartHotel-OnPrem-Simulation
version: 1.0.0
summary: Stage 1 - On-prem infra simulation (WAF + 2x Web + SQL)
description: >
  Provisions 4 VMs on a single VNet to simulate the SmartHotelHost Hyper-V
  topology: UbuntuWAF, SmartHotelWeb1, SmartHotelWeb2, SmartHotelSQL1.
  Mirrors Stage 1 of the SmartHotel360 on-prem-to-Azure migration scenario.
runner: ARM
templatePath: main.bicep
parameters:
  - id: adminUsername
    name: Admin Username
    description: Local admin (Windows) / sudo user (Linux) for all 4 VMs
    type: string
    required: true

  - id: adminPassword
    name: Admin Password
    description: Must be 12+ chars with 3 of upper/lower/digit/symbol
    type: string
    required: true

  - id: allowedSourceIp
    name: Your Public IP (CIDR)
    description: e.g. 86.123.45.67/32 - find yours at whatismyip.com. Locks RDP/SSH/HTTP to just you.
    type: string
    required: true

  - id: standardVmSize
    name: Web/WAF VM Size
    type: string
    default: Standard_B2s
    allowed:
      - Standard_B2s
      - Standard_B2ms
      - Standard_D2s_v5

  - id: sqlVmSize
    name: SQL VM Size
    type: string
    default: Standard_B2ms
    allowed:
      - Standard_B2ms
      - Standard_D2s_v5
      - Standard_D4s_v5

  - id: deployApps
    name: Deploy Stage 2 Apps
    description: Installs IIS sites, SQL database, and Nginx WAF config on top of the infra
    type: boolean
    default: true
    allowed:
      - "true"
      - "false"

  - id: catalogRawBaseUrl
    name: Catalog Scripts Base URL
    description: Raw GitHub URL to this folder's /scripts directory, e.g. https://raw.githubusercontent.com/<you>/<repo>/main/SmartHotel-OnPrem-Sim/scripts
    type: string
    required: false

  - id: sqlAppPassword
    name: SQL App Login Password
    description: Password for the smarthotelapp SQL login used by the web tier - required if Deploy Stage 2 Apps is on
    type: string
    required: false
