name: SmartHotelOnPremSimulation
version: 1.0.0

summary: Stage 1 — On-prem infra simulation (WAF + 2x Web + SQL)

description: >
  Provisions 4 VMs on a single VNet to simulate the SmartHotelHost Hyper-V
  topology: UbuntuWAF, SmartHotelWeb1, SmartHotelWeb2, SmartHotelSQL1.
  Mirrors Stage 1 of the SmartHotel360 on-prem-to-Azure migration scenario.

runner: Bicep
templatePath: main.bicep

parameters:

  - id: adminUsername
    name: Admin Username
    description: Local administrator account for Windows VMs and sudo-enabled account for Linux VMs.
    type: string
    required: true

  - id: adminPassword
    name: Admin Password
    description: Must be at least 12 characters and include uppercase, lowercase, digit, and symbol.
    type: string
    required: true
    secret: true

  - id: allowedSourceIp
    name: Allowed Source IP (CIDR)
    description: Public IPv4 CIDR allowed to access RDP, SSH, and HTTP endpoints. Example- 86.123.45.67/32
    type: string
    required: true

  - id: standardVmSize
    name: Web/WAF VM Size
    description: VM size used for web and WAF tier.
    type: string
    default: Standard_B2s
    allowed:
      - Standard_B2s
      - Standard_B2ms
      - Standard_D2s_v5

  - id: sqlVmSize
    name: SQL VM Size
    description: VM size used for SQL Server tier.
    type: string
    default: Standard_B2ms
    allowed:
      - Standard_B2ms
      - Standard_D2s_v5
      - Standard_D4s_v5

  - id: deployApps
    name: Deploy application components
    description: Installs IIS apps, SQL objects, and Nginx WAF configuration after infrastructure deployment.
    type: boolean
    default: true

  - id: catalogRawBaseUrl
    name: Scripts Base URL
    description: Base URL for deployment scripts. Only required if deployApps is enabled.
    type: string
    required: false
    default: ""

  - id: sqlAppPassword
    name: SQL Application Password
    description: Password for SQL application login. Required only if deployApps is enabled.
    type: string
    required: false
    secret: true
    default: ""
